<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

    <div class="container">
        <a class="navbar-brand" href="/">ShutterStory</a>

        <div class="ms-auto">
            <a href="/" class="btn btn-light btn-sm me-2">Home</a>
            <a href="/services" class="btn btn-light btn-sm me-2">Services</a>
            <a href="/gallery" class="btn btn-light btn-sm me-2">Gallery</a>
            <a href="/contact" class="btn btn-light btn-sm me-2">Contact</a>
        </div>
    </div>
    

<div class="container mt-5" style="max-width:400px;">
    <h2 class="text-center mb-4">Admin Login 🔐</h2>

    {% if error %}
    <div class="alert alert-danger text-center">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        <div class="mb-3">
            <input type="text" name="username" placeholder="Username" class="form-control" required>
        </div>

        <div class="mb-3">
            <input type="password" name="password" placeholder="Password" class="form-control" required>
        </div>

        <button class="btn btn-warning w-100">Login</button>
    </form>
</div>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>
</body>
</html>
