<!DOCTYPE html>
<html>
<head>
<title>{{ category }} Poses</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0f172a;
    color: white;
}

/* CARD */
.card {
    background: #1e293b;
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-black">
    <div class="container">
        <a href="/" class="navbar-brand">ShutterStory</a>
        <a href="/services" class="btn btn-light btn-sm">Back</a>
        <button onclick="location.reload()" class="btn btn-warning">
    🔄 Generate New Poses
</button>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="text-center mb-4">
        {{ category.capitalize() }} Pose Ideas 📸
    </h2>

    <div class="row">

        {% for img in images %}
        <div class="col-md-3 mb-4">
            <div class="card p-2">
                <img src="{{ img }}" class="img-fluid">
            </div>
        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
