<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Poppins', sans-serif;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        /* FORM BOX */
        .form-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            margin: 80px auto;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .form-box h3 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            margin-bottom: 15px;
        }

        .btn {
            border-radius: 20px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-black">
    <div class="container">
        <a class="navbar-brand" href="/">ShutterStory</a>

        <div class="ms-auto">
            <a href="/" class="btn btn-light btn-sm me-2">Home</a>
            <a href="/services" class="btn btn-light btn-sm me-2">Services</a>
            <a href="/gallery" class="btn btn-light btn-sm me-2">Gallery</a>
            <a href="/contact" class="btn btn-light btn-sm me-2">Contact</a>
            <a href="/admin" class="btn btn-success btn-sm me-2">Admin</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/admin">Admin Panel</a>

        <div class="ms-auto">
            <a href="/admin" class="btn btn-secondary btn-sm me-2">Dashboard</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<!-- FORM -->
<div class="form-box" data-aos="fade-up">

    <h3>Change Password 🔒</h3>

    <!-- SUCCESS -->
    {% if success %}
        <div class="alert alert-success text-center">
            {{ success }}
        </div>
    {% endif %}

    <!-- ERROR -->
    {% if error %}
        <div class="alert alert-danger text-center">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">

        <input type="password" name="old_password"
               class="form-control"
               placeholder="Old Password" required>

        <input type="password" name="new_password"
               class="form-control"
               placeholder="New Password" required>

        <!-- OPTIONAL CONFIRM PASSWORD -->
        <input type="password" name="confirm_password"
               class="form-control"
               placeholder="Confirm New Password" required>

        <button class="btn btn-warning w-100 mt-2">
            Update Password
        </button>
    </form>

</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>

</body>
</html>
