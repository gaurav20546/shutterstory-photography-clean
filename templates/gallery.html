<!DOCTYPE html>
<html>
<head>
<title>Gallery - ShutterStory</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- AOS -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
body {
    background: #0f172a;
    color: white;
    font-family: 'Poppins', sans-serif;
}

/* NAVBAR */
.navbar {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}

/* TITLE */
.title {
    margin-top: 30px;
}

/* GALLERY GRID */
.gallery {
    column-count: 3;
    column-gap: 15px;
    padding: 30px;
}

.gallery img {
    width: 100%;
    margin-bottom: 15px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
    opacity: 0.9;
}

/* LIGHTBOX */
.lightbox {
    display: none;
    position: fixed;
    z-index: 999;
    padding-top: 50px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
}

.lightbox img {
    display: block;
    margin: auto;
    max-width: 80%;
    max-height: 80%;
}

/* CLOSE BUTTON */
.close {
    position: absolute;
    top: 20px;
    right: 40px;
    font-size: 30px;
    color: white;
    text-decoration: none;
}

.lightbox:target {
    display: block;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">ShutterStory</a>

        <div class="ms-auto">
            <a href="/" class="nav-link d-inline text-white">Home</a>
            <a href="/services" class="nav-link d-inline text-white">Services</a>
            <a href="/contact" class="nav-link d-inline text-white">Contact</a>
        </div>
    </div>
</nav>

<!-- TITLE -->
<h1 class="text-center title" data-aos="fade-up">Our Gallery 📸</h1>

<!-- GALLERY -->
<div class="gallery">
    {% for img in images %}
        <!-- Thumbnail -->
        <a href="#img{{ img[0] }}">
            <img src="/static/uploads/{{ img[1] }}" data-aos="zoom-in">
        </a>

        <!-- Lightbox -->
        <div id="img{{ img[0] }}" class="lightbox">
            <a href="#" class="close">&times;</a>
            <img src="/static/uploads/{{ img[1] }}">
        </div>
    {% endfor %}
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>

</body>
</html>
