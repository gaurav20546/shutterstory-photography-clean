<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us | ShutterStory</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- AOS -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee');
    background-size: cover;
    background-position: center;
}

/* NAVBAR */
.navbar {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}

/* CONTAINER */
.contact-container {
    background: rgba(255,255,255,0.95);
    padding: 40px;
    border-radius: 15px;
    max-width: 500px;
    margin: 80px auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* TITLE */
.contact-container h1 {
    text-align: center;
    margin-bottom: 20px;
}

/* INPUT */
.input-group {
    margin-bottom: 15px;
}

.input-group label {
    font-size: 14px;
}

.input-group input,
.input-group textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

/* BUTTON */
.btn-submit {
    width: 100%;
    background: #0f3d2e;
    color: white;
    padding: 12px;
    border-radius: 8px;
    border: none;
}

.btn-submit:hover {
    background: #1c5c45;
}

/* INFO */
.info {
    text-align: center;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">ShutterStory</a>

        <div class="ms-auto">
            <a href="/" class="nav-link d-inline text-white">Home</a>
            <a href="/services" class="nav-link d-inline text-white">Services</a>
            <a href="/gallery" class="nav-link d-inline text-white">Gallery</a>
        </div>
    </div>
</nav>

<div class="contact-container" data-aos="fade-up">

    <h1>Contact Us 📸</h1>

    <!-- SUCCESS MESSAGE -->
    {% if success %}
    <div class="alert alert-success text-center">
        {{ success }}
    </div>
    {% endif %}

    <form method="POST">
        <div class="input-group">
            <label>Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <div class="input-group">
            <label>Message</label>
            <textarea name="message" required></textarea>
        </div>

        <button class="btn-submit">Send Message</button>
    </form>

    <div class="info">
        <p><strong>Email:</strong> arambhacinematicstudio@gmail.com</p>
        <p><strong>Phone:</strong> +91 9767568617</p>
        <p><strong>Location:</strong> Nashik, Maharashtra</p>
    </div>

</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>

</body>
</html>
