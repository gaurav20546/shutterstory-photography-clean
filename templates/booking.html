<!DOCTYPE html>
<html>
<head>
    <title>Book Now - ShutterStory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">
     <nav class="navbar navbar-expand-lg navbar-dark bg-black">
    <div class="container">
        <a class="navbar-brand" href="/">ShutterStory</a>

        <div class="ms-auto">
            <a href="/" class="btn btn-light btn-sm me-2">Home</a>
            <a href="/services" class="btn btn-light btn-sm me-2">Services</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h1 class="text-center mb-4">Book Your Shoot 📸</h1>

	{% if success %}
	<div class="alert alert-success text-center">
    	🎉 Booking Submitted Successfully!
	</div>
		{% endif %}

    <form method="POST">
        <div class="mb-3">
            <label>Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Phone</label>
            <input type="text" name="phone" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Select Service</label>
            <select name="service" class="form-control">
                <option>Wedding Photography</option>
                <option>Birthday Shoot</option>
                <option>Cinematic Shoot</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Event Date</label>
            <input type="date" name="event_date" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-warning w-100">Submit Booking</button>
    </form>
</div>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>
</body>
</html>
